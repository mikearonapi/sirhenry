# Development override — hot reload for frontend, no rebuild needed
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# The frontend source is volume-mounted so Next.js file watching works.
# The API container is unchanged (production mode).

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    command: npm run dev
