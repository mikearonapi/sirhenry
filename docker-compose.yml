services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sirhenry-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/db/financials.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sirhenry-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - HOSTNAME=0.0.0.0
